<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Quark Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000000; color: #ffffff; font-family: 'Tajawal', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 20px; }
    </style>
</head>
<body class="p-4 flex flex-col h-screen">
    
    <div class="flex items-center gap-2 mb-4 border-b border-white/10 pb-3 shrink-0">
        <svg viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6 text-blue-500">
            <path d="M12 2L2 22L12 18L22 22L12 2Z" />
        </svg>
        <h1 class="font-bold tracking-widest font-mono text-xl">QUARK</h1>
    </div>

    <div id="chat-box" class="flex-1 overflow-y-auto custom-scrollbar mb-4 space-y-3 text-sm flex flex-col">
        <div class="bg-white/5 p-3 rounded-xl border border-white/10 w-fit self-start">
            أهلاً بيك يا بطل! أنا معاك وشايف الصفحة اللي إنت فاتحها.. محتاجني ألخصها ولا أشرحلك حاجة فيها؟
        </div>
    </div>

    <div class="mt-auto shrink-0">
        <button id="analyze-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2.5 px-4 rounded-xl mb-3 transition-all text-xs shadow-lg">
            تحليل وقراءة الصفحة الحالية 👀
        </button>
        <div class="relative">
            <textarea id="user-input" rows="2" class="w-full bg-[#1e1e1e] border border-white/10 rounded-xl p-3 pr-12 text-sm text-white focus:outline-none focus:border-blue-500 resize-none" placeholder="اسأل Quark عن أي حاجة..."></textarea>
            <button id="send-btn" class="absolute bottom-3 left-3 bg-blue-600 hover:bg-blue-500 p-2 rounded-lg text-white transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="transform rotate-180"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <script src="sidepanel.js"></script>
</body>
</html>
